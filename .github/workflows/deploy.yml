name: Deploy Web and Docs to Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      # 仅打包文档，删掉了H5打包步骤 pnpm run build:h5
      - name: Build VitePress Docs
        run: pnpm run docs:build

      # 整合文件：直接拷贝仓库里已上传完毕的H5打包资源
      - name: Prepare Deployment Directory
        run: |
          mkdir -p ./dist_deploy
          # 读取仓库内已经存在的 unpackage/dist/build/web/ H5文件，不再现场构建
          cp -r ./unpackage/dist/build/web/* ./dist_deploy/
          mkdir -p ./dist_deploy/docs
          cp -r ./docs/.vitepress/dist/* ./dist_deploy/docs/
          touch ./dist_deploy/.nojekyll

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist_deploy