name: Deploy Web and Docs to Pages

on:
  push:
    branches: [ main ]
    branches-ignore:
      - gh-pages

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 拉取仓库代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 安装 pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: 配置 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 安装项目依赖
        run: pnpm install

      - name: 打包文档站点
        run: pnpm run docs:build

      - name: 整理部署目录文件
        run: |
          mkdir -p ./dist_deploy
          cp -r ./unpackage/dist/build/web/* ./dist_deploy/
          mkdir -p ./dist_deploy/docs
          cp -r ./docs/.vitepress/dist/* ./dist_deploy/docs/
          touch ./dist_deploy/.nojekyll

      - name: 部署至 GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist_deploy