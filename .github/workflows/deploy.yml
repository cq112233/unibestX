name: Deploy Web and Docs to Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build VitePress Docs
        run: pnpm run docs:build

      - name: Build H5 Site
        run: pnpm run build:h5

      - name: Prepare Deployment Directory
        run: |
          mkdir -p ./dist_deploy
          cp -r ./unpackage/dist/build/web/* ./dist_deploy/
          mkdir -p ./dist_deploy/docs
          cp -r ./docs/.vitepress/dist/* ./dist_deploy/docs/

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist_deploy
          force_orphan: true
