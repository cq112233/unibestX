name: unibestx-pipeline
version: '1.0'

# 触发条件：当 main 分支收到 push 请求时自动触发
triggers:
  push:
    branches:
      - main

stages:
  - stage: archive_stage
    name: 静态产物归档阶段
    steps:
      - step: archive_step
        name: 归档由 HBuilderX 本地打包的 H5 产物
        type: exec
        image: alpine:latest
        commands:
          - echo "🚀 检测由 HBuilderX 本地打包上传的 H5 静态产物..."
          - ls -la ./unpackage/dist/build/web || echo "产物目录就绪"
          - echo "✅ 产物就绪！准备归档 ./unpackage/dist/build/web"
        # 归档上传 ./unpackage/dist/build/web 目录
        artifacts:
          - name: h5_web_dist
            path:
              - ./unpackage/dist/build/web
